{% extends 'vendas/base.html' %}


{% block titulo %}Editar {{ product.nome }}{% endblock %}

{% block conteudo %}
    <h2>Editar {{ p.nome }}</h2>

    <form method="POST"  enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
       <a href="{% url 'details' id=product.id %}">Cancelar</a>
    </form>
{% endblock %}
