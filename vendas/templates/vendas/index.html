{% extends 'vendas/base.html' %}

{% block titulo %}Início{% endblock %}

{% block conteudo %}
    <h1>Produtos em Destaque</h1>
    <ul>
        {% for product in product %}
            <li>
                <a href="/product/{{ product.id }}/">{{ product.nome }}</a>
                — {{ product.marca }} — {{ product.preço }}
            </li>
        {% empty %}
            <li>Estamos sem estoque.</li>
        {% endfor %}
    </ul>
{% endblock %}
