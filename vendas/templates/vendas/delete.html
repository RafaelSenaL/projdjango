{% extends 'vendas/base.html' %}

{% block titulo %}Deletar {{ product.nome }}{% endblock %}

{% block conteudo %}
    <h2>Deletar {{ p.nome }}?</h2>
    <p>Essa ação não pode ser desfeita!</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Confirmar</button>
        <a href="{% url 'details' id=p.id %}">Cancelar</a>
    </form>
{% endblock %}
