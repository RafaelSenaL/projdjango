{% extends 'vendas/base.html' %}

{% block titulo %}{{ product.nome }}{% endblock %}

{% block conteudo %}
<h2>{{ product.nome }}</h2>
<p><strong>Marca:</strong> {{ product.marca }}</p>
<p><strong>Preço:</strong> {{ product.preço }} $</p>

<a href="{% url 'edit' id=product.id %}">Editar</a> |
<a href="{% url 'delete' id=product.id %}">Deletar</a> |
<a href="{% url 'index' %}">Voltar</a>
{% endblock %}
