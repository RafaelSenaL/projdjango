{% extends 'vendas/base.html' %}
{% load widget_tweaks %}

{% block conteudo %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Fale Conosco</h2>
            <form method="POST" class="shadow p-4 bg-light rounded">
                {% csrf_token %}
                
                {# O segredo está aqui: injeta a classe em todos os inputs gerados pelo as_p #}
                <div class="form-bootstrap-style">
                    {{ form.as_p }}
                </div>

                <button type="submit" class="btn btn-primary w-100">Enviar</button>
            </form>
        </div>
    </div>
</div>

<style>
    .form-bootstrap-style p { margin-bottom: 1rem; }
    .form-bootstrap-style input, 
    .form-bootstrap-style textarea { 
        display: block;
        width: 100%;
        padding: .375rem .75rem;
        font-size: 1rem;
        border: 1px solid #dee2e6;
        border-radius: .375rem;
    }
</style>
{% endblock %}
