{% extends 'vendas/base.html' %}

{% block titulo %}Criar Conta{% endblock %}

{% block conteudo %}
<h2>Crie sua conta</h2>
<form method="POST">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button type="submit">Criar</button>
</form>

<p>Já tem uma conta? <a href="{% url 'login' %}">Faça login aqui</a></p>
{% endblock %}
